<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Contact ME</title>
    <style>
        body {
            background-color: #ffeef2;
            font-family: "Georgia", serif;
            border: 15px double #fff;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            overflow: hidden;
        }

        .intro-container {
            text-align: center;
            background-color: #fff0f5;
            padding: 40px;
            border-radius: 12px;
            border: 6px dashed #fff;
            outline: 8px solid #ffccd5;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.4);
            position: relative;
            max-width: 400px;
            animation: floatAnimation 4s ease-in-out infinite;
        }

        .intro-container::before {
            content: "🎀";
            font-size: 50px;
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
        }

        h1 {
            color: #ff85a2;
            font-size: 24px;
            font-style: italic;
            margin-bottom: 25px;
            text-shadow: 1px 1px 0px #fff;
        }

         ul {
            list-style-type: none;
            padding: 0;
            margin: 0 0 30px 0;
            text-align: left;
        }

        li {
            font-size: 16px;
            line-height: 1.6;
            color: #b36b77;
            background-color: #fff;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px dashed #ffccd5;
            opacity: 0;
            transform: translateY(15px);
            animation: slideUpIn 0.6s ease-out forwards;
        }

        li:nth-child(1) { animation-delay: 0.3s; }
        li:nth-child(2) { animation-delay: 0.6s; }
        li:nth-child(3) { animation-delay: 0.9s; }
        li:nth-child(4) { animation-delay: 1.2s; }

        li p a {
            color: #ff5c8a;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 2px dotted #ffccd5;
        }
        
        li p a:hover {
            color: #ff85a2;
        }

        b {
            color: #ff5c8a;
        }

        .enter-btn {
            display: inline-block;
            text-decoration: none;
            background-color: #ffccd5;
            color: #b36b77;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 20px;
            border: 2px dashed #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            cursor: pointer;
            margin-top: 10px;
        }

        .enter-btn:hover {
            background-color: #ff85a2;
            color: white;
            transform: scale(1.05);
        }

        @keyframes floatAnimation {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes blinkImage {
            0%, 100% {
                opacity: 1;
            }
            45%, 55% {
                opacity: 0;
            }
        }

        @keyframes slideUpIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>
<body>

 <div class="intro-container">

    <h1> Contact Me! </h1>
    
    <ul>
       <li><p> If you have any questions, suggestions, or just want to say hi, feel free to reach out to me!</p></li>
       <li><p> I would love to hear from you.</p></li>
       <li><p> You can contact me through this survey form: <a href="https://forms.gle/1LPwqnFqMftPbsF87" target="_blank">📩 Contact Form</a></p></li>
       <li><p> Thank you for visiting my website! </p></li>
    </ul>

    <a href="main.html" class="enter-btn">🎀 SPLASH! </a>

</div>

</body>
</html>
